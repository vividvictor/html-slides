<svg viewBox="0 0 480 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&amp;family=Nunito:wght@400;600');
      .title { font-family: 'Caveat', cursive; font-weight: 700; fill: #3d2b1f; }
      .body { font-family: 'Nunito', sans-serif; fill: #7a5c4a; }
      .accent { font-family: 'Nunito', sans-serif; font-weight: 600; fill: #ff8fa3; }
      .green-label { font-family: 'Nunito', sans-serif; font-weight: 600; fill: #5a8a6a; }
    </style>
  </defs>
  <!-- 背景：芭乐粉白 -->
  <rect width="480" height="270" fill="#fef5f0"/>
  <rect x="0" y="0" width="480" height="270" fill="#fce8e0" opacity="0.5"/>

  <!-- 手绘波浪装饰（上） -->
  <path d="M0,40 Q60,25 120,40 T240,40 T360,40 T480,40" stroke="#5a4030" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.3"/>
  <path d="M0,55 Q80,40 160,55 T320,55 T480,55" stroke="#ff8fa3" stroke-width="2.5" fill="none" opacity="0.5"/>

  <!-- 芭乐切片圆形装饰 -->
  <circle cx="400" cy="60" r="35" fill="#ff8fa3" opacity="0.25" stroke="#ff8fa3" stroke-width="1.5"/>
  <circle cx="400" cy="60" r="18" fill="#ff8fa3" opacity="0.15"/>
  <!-- 种子点 -->
  <circle cx="395" cy="55" r="2.5" fill="#f0d4a0" opacity="0.7"/>
  <circle cx="408" cy="58" r="2.5" fill="#f0d4a0" opacity="0.7"/>
  <circle cx="400" cy="66" r="2.5" fill="#f0d4a0" opacity="0.7"/>
  <circle cx="392" cy="63" r="2" fill="#f0d4a0" opacity="0.6"/>
  <circle cx="405" cy="52" r="2" fill="#f0d4a0" opacity="0.6"/>

  <!-- 小圆形装饰（右下角） -->
  <ellipse cx="430" cy="220" rx="25" ry="20" fill="#5a8a6a" opacity="0.2" stroke="#5a8a6a" stroke-width="1"/>
  <circle cx="440" cy="245" r="8" fill="#ff8fa3" opacity="0.3"/>

  <!-- 手绘波浪线（下） -->
  <path d="M0,240 Q60,225 120,240 T240,240 T360,240 T480,240" stroke="#5a8a6a" stroke-width="1.5" fill="none" opacity="0.25"/>

  <!-- 主标题 -->
  <text x="40" y="100" class="title" font-size="32">温暖的手绘笔记</text>

  <!-- 副标题 -->
  <text x="40" y="130" class="body" font-size="14" opacity="0.8">每一页都带着果香和阳光的温度</text>

  <!-- 粉色标注 -->
  <rect x="40" y="145" width="6" height="30" rx="3" fill="#ff8fa3"/>
  <text x="54" y="160" class="accent" font-size="13">Guava Style</text>
  <text x="54" y="175" class="body" font-size="11" opacity="0.7">芭乐 · 温暖手绘风格</text>

  <!-- 绿色标签 -->
  <rect x="40" y="195" width="80" height="28" rx="14" fill="#d4e8d8" stroke="#5a8a6a" stroke-width="1"/>
  <text x="80" y="213" class="green-label" font-size="11" text-anchor="middle">有机 · 自然</text>

  <!-- 手绘圆角卡片 -->
  <rect x="180" y="155" width="200" height="65" rx="22" fill="#fff0f3" stroke="#ff8fa3" stroke-width="1.5" opacity="0.8"/>
  <text x="195" y="180" class="title" font-size="15" opacity="0.9">灵感来自</text>
  <text x="195" y="200" class="body" font-size="11">Bullet Journal × 手绘文具品牌</text>

  <!-- 随性小点装饰 -->
  <circle cx="120" cy="95" r="3" fill="#ff8fa3" opacity="0.5"/>
  <circle cx="160" cy="88" r="2" fill="#f0d4a0" opacity="0.6"/>
  <circle cx="250" cy="100" r="2.5" fill="#5a8a6a" opacity="0.4"/>

  <!-- 手绘边框（右边缘） -->
  <path d="M475,0 Q478,135 475,270" stroke="#5a4030" stroke-width="1.5" fill="none" opacity="0.15" stroke-dasharray="6,4"/>
</svg>