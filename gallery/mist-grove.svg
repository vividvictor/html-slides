      <stop offset="0%" stop-color="#0f1f17"/>
      <stop offset="60%" stop-color="#1a3025"/>
      <stop offset="100%" stop-color="#0f1f17"/>
    </linearGradient>
    <radialGradient id="mist-glow" cx="75%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#f0e6d0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f0e6d0" stop-opacity="0"/>
