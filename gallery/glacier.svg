  <text x="80" y="260" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#64748b">Minimal. Pure. Trustworthy.</text>
  <text x="80" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#64748b">Nordic clarity. Ice-blue precision.</text>
